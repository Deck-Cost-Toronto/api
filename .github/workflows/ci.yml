name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  sdk:
    name: SDK typecheck + build + smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Smoke test against live API
        # Hits the already-shipped read endpoints. The POST /estimate smoke
        # gets added back once the prod deploy of deckcosttoronto.com ships
        # the calculator endpoint.
        run: |
          node --input-type=module -e "
            import { DeckCostClient } from './dist/index.js';
            const c = new DeckCostClient();
            const p = await c.getPricing();
            if (!p?.data?.materials?.length) { console.error('pricing failed'); process.exit(1); }
            const cities = await c.getCities();
            if (!(cities?.count > 0)) { console.error('cities failed'); process.exit(1); }
            const toronto = await c.getCity('toronto');
            if (toronto?.data?.slug !== 'toronto') { console.error('city failed'); process.exit(1); }
            console.log('smoke ok:', { materials: p.data.materials.length, cities: cities.count });
          "

  spec:
    name: OpenAPI spec lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Lint openapi.yaml
        run: npx -y @redocly/cli@latest lint openapi.yaml
